{% extends 'base.html' %}
{% load static %}
{% block content %}

<h1 class="text-center mb-4">Free Certificate Platforms</h1>

<div class="container">
    <div class="row">

        {% for platform in platforms %}
        <div class="col-md-4 mb-4">

            <div class="card text-center p-3 shadow-sm h-100">

                <!-- Logo -->
                <img src="{{ platform.logo }}" onerror="this.src='https://via.placeholder.com/100';"
                    style="height:60px; object-fit:contain; margin-bottom:10px;">

                <!-- Name -->
                <h5>{{ platform.name }}</h5>

                <!-- Description -->
                <p id="short-{{ platform.id }}" style="font-size:14px;">
                    {{ platform.description|truncatewords:15 }}
                </p>

                <p id="full-{{ platform.id }}" style="display:none; font-size:14px;">
                    {{ platform.description }}
                </p>

                <button id="btn-{{ platform.id }}" class="btn btn-link p-0" onclick="toggleDesc('{{ platform.id }}')">
                    Learn More
                </button>

                <!-- Button -->
                <a href="{{ platform.link }}" target="_blank" class="btn btn-primary btn-sm mt-2">
                    Visit Platform
                </a>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

<style>
    .card {
        border: none;
        border-radius: 12px;
        transition: 0.3s ease;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.57);
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.8);
    }

    body {
        min-height: 100vh;
        margin: 0;

        background: url("{% static 'images/bg.jpg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    /* remove grey overlay */
    .container {
        background: transparent !important;
    }
</style>
<script>
function toggleDesc(id) {
    var shortText = document.getElementById("short-" + id);
    var fullText = document.getElementById("full-" + id);
    var btn = document.getElementById("btn-" + id);

    if (fullText.style.display === "none") {
        shortText.style.display = "none";
        fullText.style.display = "block";
        btn.innerText = "Show Less";
    } else {
        shortText.style.display = "block";
        fullText.style.display = "none";
        btn.innerText = "Learn More";
    }
}
</script>
{% endblock %}
