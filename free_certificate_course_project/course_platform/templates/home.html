{% extends 'base.html' %}

{% block content %}

<h1 class="text-center mb-4">Free Certificate Platforms</h1>

<div class="container">
    <div class="row">

        {% for platform in platforms %}
        <div class="col-md-4 mb-4">

            <div class="card text-center p-3 shadow-sm h-100">

                <!-- Logo -->
                <img src="{{ platform.logo }}"
                     onerror="this.src='https://via.placeholder.com/100';"
                     style="height:60px; object-fit:contain; margin-bottom:10px;">

                <!-- Name -->
                <h5>{{ platform.name }}</h5>

                <!-- Description -->
                <p style="font-size:14px;">
                    {{ platform.description|truncatewords:20 }}
                </p>

                <!-- Button -->
                <a href="{{ platform.link }}" target="_blank"
                   class="btn btn-primary btn-sm mt-2">
                    Visit Platform
                </a>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

{% endblock %}
